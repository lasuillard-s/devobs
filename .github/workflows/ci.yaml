name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1

      - name: Install nightly toolchain
        run: rustup toolchain install nightly --profile minimal --component rustfmt

      - name: Check code formatting
        run: rustup run nightly cargo fmt --check

      - name: Lint code
        run: cargo clippy --all-targets --all-features -- --deny warnings

  ub-check:
    name: UB Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1

      - name: Install nightly toolchain
        run: rustup toolchain install nightly --profile minimal --component miri

      - name: Install devtools
        uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2.81.11
        with:
          tool: cargo-nextest

      - name: Run tests with Miri
        env:
          MIRIFLAGS: '-Zmiri-disable-isolation'
        run: |
          rustup run nightly cargo miri \
            nextest run --workspace --all-targets --all-features

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1

      - name: Install devtools
        uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2.81.11
        with:
          tool: cargo-llvm-cov,cargo-nextest

      - name: Run tests
        run: |
          cargo llvm-cov nextest --workspace --all-targets --all-features --lcov --output-path lcov.info
          cargo llvm-cov report --summary-only

      - name: Upload test results to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          use_oidc: true
          fail_ci_if_error: false
          report_type: test_results
          files: target/nextest/default/junit.xml

      - name: Upload coverage report
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          use_oidc: true
          fail_ci_if_error: false
          files: lcov.info
